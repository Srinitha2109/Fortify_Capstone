<div class="app-container">
  <!-- Global Loading Indicator -->
  @if (loadingService.isLoading()) {
    <div
      class="fixed inset-0 z-[9999] flex items-center justify-center bg-white/80 backdrop-blur-sm">
      <div class="flex flex-col items-center gap-4">
        <!-- Add a beautiful custom rotating logo or spinner here -->
        <div class="w-16 h-16 border-4 border-burgundy/20 border-t-burgundy rounded-full animate-spin"></div>
        <span class="text-burgundy font-black uppercase tracking-widest text-sm animate-pulse">Loading...</span>
      </div>
    </div>
  }

  @if (!isDashboard()) {
    <nav class="navbar">
      <div class="nav-content">
        <a routerLink="/" class="logo">
          <span class="logo-text">Fortify<span class="logo-accent"></span></span>
        </a>
        <div class="nav-links">
          <a routerLink="/landing" routerLinkActive="active" class="nav-item">Home</a>
          <button (click)="themeService.toggleTheme()" class="theme-toggle"
            [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
            <span class="icon">{{ themeService.isDark() ? '☼' : '☾' }}</span>
          </button>
          <a routerLink="/login" class="btn btn-primary login-btn">Login</a>
        </div>
      </div>
    </nav>
  }

  <main class="main-content" [class.full-page]="isDashboard()">
    <router-outlet></router-outlet>
  </main>

  @if (!isDashboard()) {
    <footer class="footer">
      <div class="footer-content">
        <p>&copy; 2026 Commercial Insurance Pro. All rights reserved.</p>
      </div>
    </footer>
  }

  <!-- Notifications Overlay -->
  <div class="notification-container">
    @for (note of notifications(); track note) {
      <div [class]="'notification ' + note.type"
        (click)="notificationService.remove(note.id)">
        <span class="message">{{ note.message }}</span>
        <button class="close-btn">&times;</button>
      </div>
    }
  </div>
</div>
